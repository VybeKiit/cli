# Opens a deduped GitHub issue when CI fails on main — agent-friendly triage block included.
name: CI failure issue

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  issues: write
  actions: read
  contents: read

jobs:
  open-issue:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Open or skip duplicate issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const dedupKey = `ci-failure-${run.id}`;
            const shortSha = run.head_sha.slice(0, 7);
            const title = `CI failed on main — ${shortSha}`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 100,
            });

            if (openIssues.some((issue) => issue.body?.includes(dedupKey))) {
              core.info(`Issue already open for ${dedupKey}`);
              return;
            }

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
            });
            const failedJobs = jobs.filter((j) => j.conclusion === 'failure').map((j) => j.name);

            const body = [
              `<!-- ${dedupKey} -->`,
              '## CI failure on main',
              '',
              `- **Repo:** ${context.repo.owner}/${context.repo.repo}`,
              `- **Run:** ${run.html_url}`,
              `- **Commit:** \`${run.head_sha}\` — ${run.head_commit?.message ?? '(no message)'}`,
              `- **Author:** @${run.head_commit?.author?.name ?? 'unknown'}`,
              `- **Failed jobs:** ${failedJobs.length > 0 ? failedJobs.join(', ') : '(see run logs)'}`,
              '',
              '## Agent instructions',
              `1. Check out \`${run.head_sha}\` locally`,
              '2. Reproduce: `pnpm lint && pnpm typecheck && pnpm test && pnpm test:scripts && pnpm build` (monorepo) or `pnpm quality` (templates)',
              '3. Fix the failure; open a PR — do NOT push to main',
              '4. Close this issue when CI is green on the merge commit',
              '',
              '## Logs',
              `See the [failed workflow run](${run.html_url}) for full job logs.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure', 'agent-triage'],
            });
